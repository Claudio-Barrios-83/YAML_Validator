<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Validate YAML syntax and clean Kubernetes-style manifests online. Free, no install."
    />
    <meta name="robots" content="index, follow" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#1e1e1e" />
    <meta property="og:title" content="YAML Validator — syntax check &amp; clean" />
    <meta
      property="og:description"
      content="Validate YAML syntax and clean Kubernetes-style manifests online."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <title>YAML Validator — syntax check &amp; clean</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <div class="top-bar__brand">
          <span class="top-bar__logo" aria-hidden="true">{ }</span>
          <div class="top-bar__titles">
            <p class="top-bar__title">YAML Validator</p>
            <p class="top-bar__tagline">Syntax check &amp; clean YAML</p>
          </div>
        </div>
        <button
          type="button"
          class="btn-icon theme-toggle"
          id="theme-toggle"
          aria-label="Toggle light or dark theme"
          title="Light / dark theme"
        >
          <span class="theme-toggle__glyph" aria-hidden="true"></span>
        </button>
      </header>

      <main class="main">
        <section class="intro" aria-labelledby="page-title">
          <h1 id="page-title">YAML Validator</h1>
          <p class="intro__lead">
            Check YAML syntax and normalize manifests in the browser—built for
            configs, CI, and Kubernetes workflows. No install; runs entirely in
            your session.
          </p>
        </section>

        <section class="workspace" aria-label="YAML editor">
          <section class="editor-panel" aria-labelledby="label-input">
          <div class="editor-panel__chrome">
            <div class="editor-panel__tab" id="label-input">
              <span class="editor-panel__dot editor-panel__dot--in"></span>
              <span>Input</span>
            </div>
            <button type="button" class="btn btn-ghost btn-compact" id="btn-clear-input">
              Clear input
            </button>
          </div>
          <div class="editor-panel__body">
            <textarea
              id="yaml-input"
              class="editor-textarea"
              spellcheck="false"
              placeholder="# Paste YAML&#10;foo: bar&#10;nested:&#10;  list:&#10;    - 1&#10;    - 2"
            ></textarea>
          </div>
          </section>

          <div class="action-rail" role="group" aria-label="YAML actions">
          <button type="button" class="btn btn-primary" id="btn-validate">Validate</button>
          <button type="button" class="btn btn-secondary" id="btn-clean">Clean</button>
          </div>

          <section class="editor-panel" aria-labelledby="label-output">
          <div class="editor-panel__chrome">
            <div class="editor-panel__tab" id="label-output">
              <span class="editor-panel__dot editor-panel__dot--out"></span>
              <span>Output</span>
            </div>
            <button type="button" class="btn btn-ghost btn-compact" id="btn-copy-output">
              Copy output
            </button>
          </div>
          <div class="editor-panel__body">
            <textarea
              id="yaml-output"
              class="editor-textarea"
              readonly
              spellcheck="false"
              placeholder="Validation message or cleaned YAML appears here."
            ></textarea>
          </div>
          </section>
        </section>
      </main>

      <footer class="status-bar" role="status" aria-live="polite">
        <span id="status-text">Ready</span>
      </footer>
    </div>

    <script>
      const input = document.getElementById("yaml-input");
      const output = document.getElementById("yaml-output");
      const statusText = document.getElementById("status-text");
      const btnValidate = document.getElementById("btn-validate");
      const btnClean = document.getElementById("btn-clean");
      const btnClearInput = document.getElementById("btn-clear-input");
      const btnCopyOutput = document.getElementById("btn-copy-output");
      const themeToggle = document.getElementById("theme-toggle");

      const THEME_KEY = "yaml-validator-theme";

      function getPreferredTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        if (saved === "light" || saved === "dark") return saved;
        if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches)
          return "light";
        return "dark";
      }

      function applyTheme(theme) {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem(THEME_KEY, theme);
      }

      applyTheme(getPreferredTheme());

      themeToggle.addEventListener("click", () => {
        const next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
        applyTheme(next);
      });

      function setStatus(msg) {
        statusText.textContent = msg;
      }

      async function postText(url, body) {
        return fetch(url, {
          method: "POST",
          headers: { "Content-Type": "text/plain; charset=utf-8" },
          body,
        });
      }

      btnClearInput.addEventListener("click", () => {
        input.value = "";
        input.focus();
        setStatus("Input cleared");
      });

      btnCopyOutput.addEventListener("click", async () => {
        const text = output.value;
        if (!text) {
          setStatus("Nothing to copy");
          return;
        }
        try {
          await navigator.clipboard.writeText(text);
          setStatus("Copied to clipboard");
          const original = btnCopyOutput.textContent;
          btnCopyOutput.textContent = "Copied!";
          setTimeout(() => {
            btnCopyOutput.textContent = original;
          }, 1600);
        } catch (e) {
          setStatus("Copy failed — select text manually");
        }
      });

      btnValidate.addEventListener("click", async () => {
        const yamlText = input.value;
        setStatus("Validating…");
        try {
          const res = await postText("/validate", yamlText);
          const data = await res.json();
          if (data.valid) {
            let text =
              "# Validation successful — YAML syntax is OK.\n" +
              (typeof data.documentCount === "number"
                ? `# documents_in_stream: ${data.documentCount}\n`
                : "") +
              "# (ValidKube-style: empty list = nothing failed this check.)\n" +
              "resources: []\n\n" +
              "---\n\n" +
              "This check only confirms the parser could read your YAML. It does not validate Kubernetes API schemas, CRDs, or policies.\n";
            if (data.json !== undefined && data.json !== null) {
              text += "\nParsed structure (JSON preview):\n\n";
              try {
                text += JSON.stringify(data.json, null, 2);
              } catch (e) {
                text += String(data.json);
              }
            } else {
              text += "\nNo JSON preview (empty or null document).";
            }
            output.value = text;
            setStatus("Validation successful");
          } else {
            output.value = data.error || data.message || "Invalid YAML";
            setStatus("Validation failed");
          }
        } catch (e) {
          output.value = "Network error: " + (e.message || String(e));
          setStatus("Request failed");
        }
      });

      btnClean.addEventListener("click", async () => {
        const yaml = input.value;
        setStatus("Cleaning…");
        try {
          const res = await postText("/clean", yaml);
          const text = await res.text();
          output.value = text;
          setStatus(res.ok ? "Clean YAML ready" : "Clean failed (see output)");
        } catch (e) {
          output.value = "Network error: " + (e.message || String(e));
          setStatus("Request failed");
        }
      });
    </script>
  </body>
</html>
